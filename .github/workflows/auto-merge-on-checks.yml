# =============================================================================
# GitHub Action: Auto-Merge or Auto-Close Pull Request based on Checks
# Descrição: Monitora PRs abertas e:
#            ✅ Faz merge automaticamente quando todos os checks passam
#            ❌ Fecha a PR e deleta a branch quando qualquer check falha
# Disparo: check_suite (completed) + pull_request (opened/synchronized)
#          + schedule (cron a cada 5 min para PRs já abertas)
# Permissões: pull-requests: write | contents: write | checks: read
# =============================================================================

name: Auto-Merge or Auto-Close PR based on Checks

on:
  # Disparado quando qualquer suite de checks finaliza (sucesso ou falha)
  check_suite:
    types: [completed]

  # Disparado quando uma PR é aberta ou atualizada com novos commits
  pull_request:
    types: [opened, synchronize, reopened]

  # Varre todas as PRs abertas a cada 5 minutos.
  # Resolve o caso de PRs que já existiam antes do workflow ser criado,
  # ou cujos checks finalizaram sem disparar o evento check_suite.
  # Sintaxe cron: minuto hora dia mês dia-da-semana
  schedule:
    - cron: '*/5 * * * *'

  # Permite disparar manualmente pelo GitHub UI (útil para debug e PRs já abertas)
  workflow_dispatch:

permissions:
  # Necessário para ler status dos checks e dados da PR
  pull-requests: write
  # Necessário para executar o merge no repositório
  contents: write
  # Necessário para ler o status dos checks
  checks: read
  # Necessário para ler statuses de commits externos (ex: CircleCI, Travis)
  statuses: read

jobs:
  auto-merge-or-close:
    name: Auto-Merge or Auto-Close based on Checks
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # STEP 1: Checkout mínimo do repositório (necessário para usar a CLI gh)
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # STEP 2: Aguarda estabilização dos checks
      # Evita race condition entre o evento disparador e os checks chegarem
      # à API do GitHub. 10 segundos é um buffer seguro para a maioria dos casos.
      # ------------------------------------------------------------------
      - name: Wait for checks to stabilize
        run: sleep 10

      # ------------------------------------------------------------------
      # STEP 3: Busca todas as PRs abertas, faz merge nas elegíveis e
      # fecha + deleta branch das que falharam.
      # ------------------------------------------------------------------
      - name: Check, merge or close PRs based on check results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

          # Estratégia de merge: squash | merge | rebase
          MERGE_METHOD: squash

          # Comentário postado automaticamente na PR ao fechá-la por falha.
          # Personalize à vontade.
          CLOSE_COMMENT: |
            ❌ **Esta PR foi fechada automaticamente** porque um ou mais checks falharam.

            A branch foi deletada. Corrija os erros, crie uma nova branch e abra uma nova PR.

        run: |
          set -euo pipefail

          echo "🔍 Buscando Pull Requests abertas em: $REPO"

          PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,title,headRefName,baseRefName,mergeable,url \
            --limit 100)

          TOTAL=$(echo "$PRS" | jq 'length')
          echo "📋 Total de PRs abertas encontradas: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "ℹ️ Nenhuma PR aberta encontrada. Encerrando."
            exit 0
          fi

          echo "$PRS" | jq -c '.[]' | while read -r PR; do
            PR_NUMBER=$(echo "$PR"   | jq -r '.number')
            PR_TITLE=$(echo "$PR"    | jq -r '.title')
            PR_URL=$(echo "$PR"      | jq -r '.url')
            PR_BRANCH=$(echo "$PR"   | jq -r '.headRefName')
            MERGEABLE=$(echo "$PR"   | jq -r '.mergeable')

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔎 Analisando PR #$PR_NUMBER: $PR_TITLE"
            echo "   Branch: $PR_BRANCH"
            echo "   URL: $PR_URL"
            echo "   Mergeável: $MERGEABLE"

            # ------------------------------------------------------------------
            # Coleta o statusCheckRollup da PR (agrega todos os checks)
            # ------------------------------------------------------------------
            PR_DETAIL=$(gh pr view "$PR_NUMBER" \
              --repo "$REPO" \
              --json commits,statusCheckRollup)

            HEAD_SHA=$(echo "$PR_DETAIL" | jq -r '.commits[-1].oid')
            echo "   HEAD SHA: $HEAD_SHA"

            CHECK_ROLLUP=$(echo "$PR_DETAIL" | jq -r '.statusCheckRollup // empty')

            if [ -z "$CHECK_ROLLUP" ]; then
              echo "⚠️  PR #$PR_NUMBER ignorada — nenhum check disponível ainda."
              continue
            fi

            TOTAL_CHECKS=$(echo "$CHECK_ROLLUP" | jq 'length')
            PENDING=$(echo "$CHECK_ROLLUP" | jq '[.[] | select(.state == "PENDING" or .state == "IN_PROGRESS" or .status == "IN_PROGRESS" or .status == "QUEUED")] | length')
            FAILED=$(echo "$CHECK_ROLLUP"  | jq '[.[] | select(.state == "FAILURE" or .state == "ERROR" or .conclusion == "FAILURE" or .conclusion == "TIMED_OUT" or .conclusion == "CANCELLED")] | length')
            PASSED=$(echo "$CHECK_ROLLUP"  | jq '[.[] | select(.state == "SUCCESS" or .conclusion == "SUCCESS")] | length')

            echo "   📊 Checks — Total: $TOTAL_CHECKS | ✅ Passou: $PASSED | ⏳ Pendente: $PENDING | ❌ Falhou: $FAILED"

            # ------------------------------------------------------------------
            # CASO 1: Checks ainda rodando — aguarda próxima execução do cron
            # ------------------------------------------------------------------
            if [ "$PENDING" -gt 0 ]; then
              echo "⏳ PR #$PR_NUMBER aguardando — $PENDING check(s) ainda em execução."
              continue
            fi

            # ------------------------------------------------------------------
            # CASO 2: Algum check falhou → Fecha a PR e deleta a branch
            # ------------------------------------------------------------------
            if [ "$FAILED" -gt 0 ]; then
              echo "❌ PR #$PR_NUMBER teve $FAILED check(s) com falha — fechando e deletando branch..."

              # Posta comentário explicativo antes de fechar
              gh pr comment "$PR_NUMBER" \
                --repo "$REPO" \
                --body "$CLOSE_COMMENT" \
                && echo "   💬 Comentário postado na PR." \
                || echo "   ⚠️  Falha ao postar comentário (não crítico)."

              # Fecha a PR sem fazer merge
              gh pr close "$PR_NUMBER" \
                --repo "$REPO" \
                && echo "   🔒 PR #$PR_NUMBER fechada com sucesso." \
                || echo "   ⚠️  Falha ao fechar PR #$PR_NUMBER (pode já estar fechada)."

              # Deleta a branch remota da PR
              # Usa a API REST diretamente pois `gh` não tem comando nativo para deletar branch
              DELETE_RESPONSE=$(gh api \
                --method DELETE \
                "repos/$REPO/git/refs/heads/$PR_BRANCH" \
                --silent \
                -w "%{http_code}" 2>&1) || true

              if echo "$DELETE_RESPONSE" | grep -q "^204$\|^200$"; then
                echo "   🗑️  Branch '$PR_BRANCH' deletada com sucesso."
              elif echo "$DELETE_RESPONSE" | grep -q "^422$\|^404$"; then
                echo "   ℹ️  Branch '$PR_BRANCH' não encontrada ou já deletada."
              else
                echo "   ⚠️  Resposta inesperada ao deletar branch: $DELETE_RESPONSE"
              fi

              continue
            fi

            # ------------------------------------------------------------------
            # CASO 3: Sem checks passando — dados insuficientes
            # ------------------------------------------------------------------
            if [ "$PASSED" -eq 0 ]; then
              echo "⚠️  PR #$PR_NUMBER ignorada — nenhum check passou (sem dados suficientes)."
              continue
            fi

            # ------------------------------------------------------------------
            # CASO 4: Todos os checks passaram → Faz o merge
            # ------------------------------------------------------------------
            if [ "$MERGEABLE" != "MERGEABLE" ]; then
              echo "⚠️  PR #$PR_NUMBER com checks ok, mas não mergeável: '$MERGEABLE'"
              echo "   → Possível conflito. Nenhuma ação tomada."
              continue
            fi

            echo "✅ Todos os $PASSED checks passaram! Executando merge da PR #$PR_NUMBER..."

            MERGE_OUTPUT=$(gh pr merge "$PR_NUMBER" \
              --repo "$REPO" \
              --"$MERGE_METHOD" \
              --auto \
              --delete-branch 2>&1) || MERGE_EXIT=$?

            if [ "${MERGE_EXIT:-0}" -eq 0 ]; then
              echo "🎉 Merge da PR #$PR_NUMBER realizado com sucesso!"
            else
              if echo "$MERGE_OUTPUT" | grep -qi "already merged\|pull request is closed"; then
                echo "ℹ️  PR #$PR_NUMBER já estava mergeada. Ignorando."
              else
                echo "⚠️  Falha ao mergear PR #$PR_NUMBER — Erro: $MERGE_OUTPUT"
              fi
            fi

          done

          echo ""
          echo "✅ Processamento de todas as PRs concluído."
